name: Publicar EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag da release no formato vX.Y.Z'
        required: true
        type: string

permissions:
  contents: write

jobs:
  gerar-publicar-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Definir tag da release
        id: release_meta
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = '${{ inputs.tag }}'
          }
          else {
            $tag = '${{ github.ref_name }}'
          }

          if (-not $tag) {
            throw 'Tag de release nao informada.'
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "zip_name=InstaladorLabs-$tag-win64.zip" >> $env:GITHUB_OUTPUT

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Gerar executavel
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\build_exe.ps1

      - name: Compactar bundle
        shell: pwsh
        run: |
          $bundlePath = Join-Path $PWD 'dist\InstaladorLabs'
          if (-not (Test-Path $bundlePath)) {
            throw "Bundle nao encontrado em $bundlePath"
          }

          $zipPath = Join-Path $PWD '${{ steps.release_meta.outputs.zip_name }}'
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $bundlePath '*') -DestinationPath $zipPath

      - name: Publicar release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.release_meta.outputs.zip_name }}
