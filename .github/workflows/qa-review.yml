name: QA Review com Gemini

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  issues: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Obter diff do PR
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt

      - name: Enviar para Gemini e postar comentário
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            if (!process.env.GEMINI_API_KEY) {
              throw new Error('Secret GEMINI_API_KEY ausente.');
            }

            const diff = fs.readFileSync('diff.txt', 'utf8').slice(0, 3000);
            const payload = {
              contents: [{
                parts: [{
                  text: `Você é um analista de QA especialista em Python e automação Windows. Responda exclusivamente em Português do Brasil. Analise o diff abaixo e aponte: erros de lógica, ausência de tratamento de erros, cenários de falha não cobertos, e sugestões de melhoria. Seja direto e objetivo.\n\nDiff:\n${diff}`
                }]
              }]
            };

            const res = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              }
            );

            const rawBody = await res.text();
            console.log(`Gemini raw response: ${rawBody}`);

            if (!res.ok) {
              throw new Error(`Gemini HTTP ${res.status}: ${rawBody}`);
            }

            let data;
            try {
              data = JSON.parse(rawBody);
            } catch (error) {
              throw new Error(`Resposta do Gemini não é JSON válido: ${error.message}`);
            }

            const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
            if (!text) {
              throw new Error(`Gemini não retornou análise utilizável. Resposta: ${rawBody}`);
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 QA Review — Gemini\n\n${text}`
            });
