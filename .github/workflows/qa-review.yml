name: QA Review com Gemini

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Obter diff do PR
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          echo "diff=$(cat diff.txt | head -c 3000 | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: Enviar para Gemini
        id: gemini
        run: |
          DIFF=$(cat diff.txt | head -c 3000)
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":\"Você é um analista de QA especialista em Python e automação Windows. Analise o diff abaixo e aponte: erros de lógica, ausência de tratamento de erros, cenários de falha não cobertos, e sugestões de melhoria. Seja direto e objetivo.\n\nDiff:\n$(echo "$DIFF" | sed 's/"/\\"/g' | tr '\n' ' ')\"}]}]}")
          echo "response<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Postar comentário no PR
        uses: actions/github-script@v7
        with:
          script: |
            const response = JSON.parse(`${{ steps.gemini.outputs.response }}`);
            const text = response.candidates?.[0]?.content?.parts?.[0]?.text || 'Gemini não retornou análise.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 QA Review — Gemini\n\n${text}`
            });
