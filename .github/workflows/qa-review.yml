name: QA Review com Gemini

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  issues: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Obter diff do PR
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt

      - name: Enviar para Gemini e postar comentário
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('diff.txt', 'utf8').slice(0, 3000);
            const res = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{
                    parts: [{
                      text: `Você é um analista de QA especialista em Python e automação Windows. Analise o diff abaixo e aponte: erros de lógica, ausência de tratamento de erros, cenários de falha não cobertos, e sugestões de melhoria. Seja direto e objetivo.\n\nDiff:\n${diff}`
                    }]
                  }]
                })
              }
            );
            const data = await res.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Gemini não retornou análise.';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 QA Review — Gemini\n\n${text}`
            });
